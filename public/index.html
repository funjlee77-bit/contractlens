<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContractLens - 계약서 번역 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#f4f1ea;--card:#fff;--primary:#1a2d42;--primary-light:#243d59;
  --accent:#a67c2a;--accent-light:#f5edd8;--accent-border:#dfc98a;
  --text:#1c2b3a;--text-muted:#7a8694;--border:#ddd8ce;
  --success:#2d7d46;--success-bg:#e8f5ee;--error:#c0392b;--error-bg:#fdf0ee;
  --shadow:0 2px 20px rgba(26,45,66,0.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;}
.header{background:var(--primary);color:white;height:62px;display:flex;align-items:center;padding:0 2.5rem;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,0.25);}
.logo{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:0.5rem;cursor:pointer;}
.logo em{color:#c9a84c;font-style:normal;}
.logo-badge{font-size:0.65rem;background:rgba(201,168,76,0.25);color:#c9a84c;border:1px solid rgba(201,168,76,0.4);border-radius:4px;padding:0.1rem 0.4rem;letter-spacing:0.5px;font-weight:700;margin-left:0.3rem;}
.header-sub{font-size:0.82rem;color:rgba(255,255,255,0.55);letter-spacing:1.5px;text-transform:uppercase;font-weight:300;}
.main{max-width:1100px;margin:0 auto;padding:2.5rem 2rem;}
.card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);border:1px solid var(--border);padding:1.75rem;margin-bottom:1.25rem;}
.sec-label{font-size:0.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}
.btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.7rem 1.4rem;border-radius:9px;border:none;cursor:pointer;font-family:inherit;font-size:0.92rem;font-weight:600;transition:all 0.18s ease;white-space:nowrap;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.btn-primary{background:var(--primary);color:white;}
.btn-primary:hover:not(:disabled){background:var(--primary-light);transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,45,66,0.3);}
.btn-accent{background:var(--accent);color:white;}
.btn-accent:hover:not(:disabled){background:#8a6622;transform:translateY(-1px);}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border);}
.btn-outline:hover:not(:disabled){background:var(--accent-light);border-color:var(--accent-border);}
.btn-lg{padding:0.9rem 2rem;font-size:1.02rem;border-radius:11px;}
.btn-sm{padding:0.45rem 1rem;font-size:0.85rem;border-radius:7px;}
.input-field{width:100%;padding:0.8rem 1rem;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:0.98rem;color:var(--text);background:var(--bg);transition:border-color 0.18s;outline:none;}
.input-field:focus{border-color:var(--accent);background:white;}
.home-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--primary);margin-bottom:0.4rem;}
.home-desc{color:var(--text-muted);font-size:0.95rem;margin-bottom:2rem;}
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1.25rem;}
.proj-card{background:var(--card);border-radius:14px;padding:1.5rem;border:1.5px solid var(--border);cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.proj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--primary),var(--accent));opacity:0;transition:opacity 0.2s;}
.proj-card:hover{border-color:var(--accent-border);transform:translateY(-3px);box-shadow:0 8px 32px rgba(26,45,66,0.14);}
.proj-card:hover::before{opacity:1;}
.proj-card-new{border-style:dashed;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);min-height:150px;gap:0.6rem;}
.proj-card-new:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-light);}
.proj-icon{width:42px;height:42px;background:var(--accent-light);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:0.9rem;}
.proj-name{font-weight:700;font-size:1rem;color:var(--text);margin-bottom:0.35rem;}
.proj-meta{font-size:0.8rem;color:var(--text-muted);}
.back-btn{display:inline-flex;align-items:center;gap:0.4rem;color:var(--text-muted);font-size:0.88rem;font-weight:500;cursor:pointer;padding:0.4rem 0;border:none;background:none;margin-bottom:1.25rem;}
.back-btn:hover{color:var(--accent);}
.proj-heading{display:flex;align-items:center;gap:1rem;margin-bottom:2rem;}
.proj-heading-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--primary),#2a4a6a);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;}
.proj-heading-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--primary);}
.proj-heading-sub{font-size:0.85rem;color:var(--text-muted);margin-top:0.1rem;}
.steps-bar{display:flex;border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:2rem;background:var(--card);}
.step-item{flex:1;padding:0.7rem 0.5rem;text-align:center;font-size:0.78rem;color:var(--text-muted);border-right:1px solid var(--border);font-weight:500;}
.step-item:last-child{border-right:none;}
.step-item.step-active{background:var(--primary);color:white;font-weight:600;}
.step-item.step-done{background:var(--accent-light);color:var(--accent);}
.dropzone{border:2px dashed var(--border);border-radius:14px;padding:2.5rem 2rem;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--bg);position:relative;}
.dropzone:hover,.dropzone.drag-active{border-color:var(--accent);background:var(--accent-light);}
.dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.dz-icon{font-size:3rem;color:var(--text-muted);margin-bottom:0.75rem;}
.dz-title{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:0.35rem;}
.dz-sub{font-size:0.85rem;color:var(--text-muted);}
.dz-types{display:inline-flex;gap:0.4rem;margin-top:0.75rem;flex-wrap:wrap;justify-content:center;}
.dz-tag{padding:0.2rem 0.6rem;background:white;border:1px solid var(--border);border-radius:5px;font-size:0.75rem;font-weight:600;color:var(--text-muted);}
.file-preview{display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;background:var(--success-bg);border:1.5px solid #a8d5b8;border-radius:10px;margin-top:1rem;}
.file-preview-icon{font-size:1.8rem;}
.file-preview-name{font-weight:600;font-size:0.95rem;color:var(--success);flex:1;}
.file-preview-size{font-size:0.82rem;color:var(--text-muted);}
.file-clear{background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--text-muted);padding:0.25rem;border-radius:5px;}
.file-clear:hover{color:var(--error);}
.format-options{display:flex;gap:0.9rem;flex-wrap:wrap;}
.format-opt{display:flex;align-items:center;gap:0.6rem;padding:0.75rem 1.2rem;border:2px solid var(--border);border-radius:10px;cursor:pointer;font-weight:500;font-size:0.9rem;transition:all 0.18s;background:var(--bg);user-select:none;}
.format-opt.checked{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.info-box{background:var(--accent-light);border-left:3px solid var(--accent);border-radius:0 9px 9px 0;padding:0.8rem 1rem;font-size:0.88rem;color:#6b5200;line-height:1.5;margin-top:0.85rem;}
.progress-wrap{text-align:center;padding:1.5rem 0;}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite;margin:0 auto 1.25rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.progress-bar-wrap{background:var(--border);border-radius:20px;height:8px;overflow:hidden;margin:1rem 0;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:20px;transition:width 0.5s ease;}
.progress-label{font-size:0.88rem;color:var(--text-muted);}
.dl-section{background:linear-gradient(135deg,var(--primary) 0%,#2a4a6a 100%);border-radius:14px;padding:2rem;color:white;}
.dl-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:0.35rem;}
.dl-sub{font-size:0.88rem;opacity:0.7;margin-bottom:1.5rem;}
.dl-buttons{display:flex;gap:0.9rem;flex-wrap:wrap;}
.dl-btn{display:flex;align-items:center;gap:0.8rem;padding:0.9rem 1.4rem;background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.22);border-radius:11px;color:white;cursor:pointer;font-family:inherit;font-size:0.92rem;font-weight:600;transition:all 0.2s;}
.dl-btn:hover{background:rgba(255,255,255,0.2);transform:translateY(-2px);}
.dl-btn-icon{font-size:1.5rem;}
.dl-btn-name{display:block;font-size:0.78rem;opacity:0.75;font-weight:400;}
.modal-overlay{position:fixed;inset:0;background:rgba(10,20,30,0.55);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-overlay.visible{opacity:1;pointer-events:all;}
.modal-box{background:var(--card);border-radius:18px;padding:2.25rem;width:440px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,0.22);transform:translateY(15px);transition:transform 0.25s ease;}
.modal-overlay.visible .modal-box{transform:translateY(0);}
.modal-title{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;margin-bottom:0.35rem;color:var(--primary);}
.modal-desc{font-size:0.88rem;color:var(--text-muted);margin-bottom:1.5rem;}
.modal-actions{display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.25rem;}
.error-box{background:var(--error-bg);border:1.5px solid #f5c6c0;border-radius:10px;padding:1rem 1.25rem;font-size:0.9rem;color:var(--error);margin-top:1rem;}
.action-row{display:flex;gap:1rem;align-items:center;margin-top:1.5rem;}
.action-hint{font-size:0.85rem;color:var(--text-muted);}
.post-dl-row{display:flex;gap:0.75rem;margin-top:1.25rem;}
.empty{text-align:center;padding:4rem 2rem;}
.empty-icon{font-size:3.5rem;margin-bottom:1rem;opacity:0.4;}
.empty-title{font-size:1.1rem;font-weight:600;color:var(--text-muted);margin-bottom:0.5rem;}
.empty-desc{font-size:0.9rem;color:var(--text-muted);}
@media(max-width:640px){
  .main{padding:1.25rem 1rem;}
  .steps-bar,.header-sub{display:none;}
  .format-options,.dl-buttons,.action-row,.post-dl-row{flex-direction:column;}
}
</style>
</head>
<body>
<header class="header">
  <div class="logo" id="logo-home">
    <span>&#128203;</span>Contract<em>Lens</em>
    <span class="logo-badge">Gemini</span>
  </div>
  <div class="header-sub">AI Contract Translation System</div>
</header>
<main class="main" id="app"></main>
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title">&#128193; 새 프로젝트 만들기</div>
    <div class="modal-desc">프로젝트명을 입력하세요. 번역된 파일명에 자동으로 반영됩니다.</div>
    <input class="input-field" id="proj-name-input" placeholder="예: ABC전환용역, XYZ법인 인수건 등" maxlength="60">
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" id="modal-cancel">취소</button>
      <button class="btn btn-primary btn-sm" id="modal-confirm">&#10003; 프로젝트 생성</button>
    </div>
  </div>
</div>

<script>
if (typeof pdfjsLib !== 'undefined') {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

var API_ENDPOINT = '/api/translate';

var state = {
  projects:[], currentProject:null, view:'home',
  file:null, fileImages:[], fileMimes:[],
  docName:'', formats:{word:true,excel:false,summary:false},
  status:'idle', progress:0, statusMsg:'',
  translationData:null, downloads:[], errorMsg:''
};
var dlBlobStore = {};

// ── MODAL ───────────────────────────────────────────────────
document.getElementById('logo-home').addEventListener('click', goHome);
document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) hideModal(); });
document.getElementById('modal-cancel').addEventListener('click', hideModal);
document.getElementById('modal-confirm').addEventListener('click', createProject);
document.getElementById('proj-name-input').addEventListener('keydown', function(e){ if(e.key==='Enter') createProject(); });

function showModal(){
  var inp = document.getElementById('proj-name-input');
  inp.value = '';
  document.getElementById('modal').classList.add('visible');
  setTimeout(function(){ inp.focus(); }, 50);
}
function hideModal(){ document.getElementById('modal').classList.remove('visible'); }

function createProject(){
  var inp = document.getElementById('proj-name-input');
  var name = inp.value.trim();
  if(!name){ inp.style.borderColor='#e74c3c'; setTimeout(function(){ inp.style.borderColor=''; },1500); return; }
  var proj = { id:String(Date.now()), name:name, createdAt:new Date().toLocaleDateString('ko-KR') };
  state.projects.unshift(proj);
  hideModal();
  openProject(proj.id);
}

// ── NAV ─────────────────────────────────────────────────────
function goHome(){ state.view='home'; state.currentProject=null; resetWorkspace(); render(); }

function openProject(id){
  for(var i=0;i<state.projects.length;i++){
    if(state.projects[i].id===id){ state.currentProject=state.projects[i]; break; }
  }
  if(!state.currentProject) return;
  state.view='project'; resetWorkspace(); render();
}

function resetWorkspace(){
  state.file=null; state.fileImages=[]; state.fileMimes=[];
  state.docName=''; state.status='idle'; state.progress=0;
  state.statusMsg=''; state.translationData=null;
  state.downloads=[]; state.errorMsg='';
  dlBlobStore={};
}

// ── RENDER ───────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML = state.view==='home' ? buildHome() : buildProject();
  bindEvents();
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── HOME ─────────────────────────────────────────────────────
function buildHome(){
  var cards = '<div class="proj-card proj-card-new" id="btn-new-proj"><div style="font-size:2rem">+</div><div style="font-size:0.95rem;font-weight:600">새 프로젝트 만들기</div></div>';
  for(var i=0;i<state.projects.length;i++){
    var p=state.projects[i];
    cards += '<div class="proj-card" data-pid="'+esc(p.id)+'"><div class="proj-icon">&#128194;</div><div class="proj-name">'+esc(p.name)+'</div><div class="proj-meta">생성일: '+esc(p.createdAt)+'</div></div>';
  }
  var empty = state.projects.length===0 ? '<div class="empty"><div class="empty-icon">&#128196;</div><div class="empty-title">아직 프로젝트가 없습니다</div><div class="empty-desc"><strong>새 프로젝트 만들기</strong>를 클릭해 시작하세요</div></div>' : '';
  return '<div class="home-title">&#128193; 프로젝트 목록</div><div class="home-desc">새 프로젝트를 생성하거나 기존 프로젝트를 클릭하여 계약서를 번역하세요.</div><div class="project-grid">'+cards+'</div>'+empty;
}

// ── PROJECT ──────────────────────────────────────────────────
function buildProject(){
  var p=state.currentProject; var s=state.status;
  var si={idle:0,extracting:2,translating:2,generating:3,done:4,error:0}[s]||0;
  var labels=['① 파일 업로드','② 서류명 입력','③ 번역 중','④ 다운로드'];
  var steps='<div class="steps-bar">';
  for(var i=0;i<labels.length;i++){
    var cls=i<si?'step-done':i===si?'step-active':'';
    steps+='<div class="step-item '+cls+'">'+labels[i]+'</div>';
  }
  steps+='</div>';

  var content='';
  if(s==='done') content=buildDlSection();
  else if(s==='extracting'||s==='translating'||s==='generating') content=buildProgress();
  else{ content=buildWorkspace(); if(s==='error') content+='<div class="error-box">&#9888; '+esc(state.errorMsg)+'</div>'; }

  return '<button class="back-btn" id="btn-back">&#8592; 프로젝트 목록으로</button>'+
    '<div class="proj-heading"><div class="proj-heading-icon">&#128194;</div><div>'+
    '<div class="proj-heading-title">'+esc(p.name)+'</div>'+
    '<div class="proj-heading-sub">P-'+esc(p.name)+' &middot; 계약서 번역 작업공간</div>'+
    '</div></div>'+steps+content;
}

function buildWorkspace(){
  var f=state.file; var pn=state.currentProject?state.currentProject.name:'';
  var fmts=state.formats;
  var preview='';
  if(f){
    var icon=f.type.indexOf('pdf')>=0?'&#128213;':'&#128247;';
    var tl=f.type.indexOf('pdf')>=0?'PDF 문서':'이미지 파일';
    preview='<div class="file-preview"><div class="file-preview-icon">'+icon+'</div>'+
      '<div><div class="file-preview-name">'+esc(f.name)+'</div>'+
      '<div class="file-preview-size">'+(f.size/1024).toFixed(1)+' KB &middot; '+tl+'</div></div>'+
      '<button class="file-clear" id="btn-clear">&#10005;</button></div>';
  }
  return '<div class="card"><div class="sec-label">① 번역할 파일 업로드</div>'+
    '<div class="dropzone" id="dropzone"><input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg,.gif,.bmp,.webp">'+
    '<div class="dz-icon">&#128193;</div>'+
    '<div class="dz-title">파일을 이곳에 드래그하거나 클릭하여 선택</div>'+
    '<div class="dz-sub">계약서 PDF 또는 스캔 이미지를 업로드하세요</div>'+
    '<div class="dz-types"><span class="dz-tag">PDF</span><span class="dz-tag">PNG</span><span class="dz-tag">JPG</span><span class="dz-tag">GIF</span><span class="dz-tag">BMP</span><span class="dz-tag">WEBP</span></div>'+
    '</div>'+preview+'</div>'+

    '<div class="card"><div class="sec-label">② 서류명을 기재하세요</div>'+
    '<input class="input-field" id="doc-name-input" placeholder="예: ABC 리스계약서, 주주간 계약서" maxlength="60" value="'+esc(state.docName)+'">'+
    '<div class="info-box">&#128161; 서류명이 파일명에 반영됩니다 &rarr; <strong>P-'+esc(pn)+'_서류명_번역본.docx</strong></div></div>'+

    '<div class="card"><div class="sec-label">③ 산출 보고서 형식 선택</div>'+
    '<div class="format-options">'+
    '<div class="format-opt '+(fmts.word?'checked':'')+'" data-fmt="word"><span>&#128221;</span> MS Word (번역본)</div>'+
    '<div class="format-opt '+(fmts.excel?'checked':'')+'" data-fmt="excel"><span>&#128202;</span> Excel (대조표)</div>'+
    '<div class="format-opt '+(fmts.summary?'checked':'')+'" data-fmt="summary"><span>&#128203;</span> 요약본 (Word)</div>'+
    '</div></div>'+
    '<div class="action-row">'+
    '<button class="btn btn-accent btn-lg" id="btn-translate">&#127760; 번역 시작</button>'+
    '<span class="action-hint">Google Gemini AI가 자동으로 언어를 감지하고 번역합니다</span>'+
    '</div>';
}

function buildProgress(){
  return '<div class="card"><div class="progress-wrap">'+
    '<div class="spinner"></div>'+
    '<div style="font-weight:700;font-size:1.05rem;margin-bottom:0.5rem">'+esc(state.statusMsg)+'</div>'+
    '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:'+state.progress+'%"></div></div>'+
    '<div class="progress-label">'+state.progress+'% 완료 &middot; 잠시만 기다려주세요...</div>'+
    '</div></div>';
}

function buildDlSection(){
  var d=state.translationData; var p=state.currentProject;
  var lang=(d&&d.detected_language)?d.detected_language:'자동감지';
  var base=makeFileName(p.name,state.docName);
  var btns='';
  for(var i=0;i<state.downloads.length;i++){
    var dl=state.downloads[i];
    btns+='<button class="dl-btn" data-dlid="'+esc(dl.id)+'">'+
      '<span class="dl-btn-icon">'+dl.icon+'</span>'+
      '<span><strong>'+esc(dl.label)+'</strong><span class="dl-btn-name">'+esc(dl.filename)+'</span></span></button>';
  }
  return '<div class="dl-section"><div class="dl-title">&#10003; 번역 완료!</div>'+
    '<div class="dl-sub">감지 언어: <strong>'+esc(lang)+'</strong> &middot; 파일명: <strong>'+esc(base)+'</strong></div>'+
    '<div class="dl-buttons">'+btns+'</div></div>'+
    '<div class="post-dl-row">'+
    '<button class="btn btn-outline" id="btn-another">&#8617; 다른 파일 번역하기</button>'+
    '<button class="btn btn-outline" id="btn-to-home">&#127968; 홈으로</button>'+
    '</div>';
}

// ── EVENTS ───────────────────────────────────────────────────
function bindEvents(){
  var el;
  el=document.getElementById('btn-new-proj'); if(el) el.addEventListener('click',showModal);
  document.querySelectorAll('[data-pid]').forEach(function(c){ c.addEventListener('click',function(){ openProject(this.getAttribute('data-pid')); }); });
  el=document.getElementById('btn-back'); if(el) el.addEventListener('click',goHome);
  el=document.getElementById('btn-clear'); if(el) el.addEventListener('click',function(){ state.file=null; state.fileImages=[]; render(); });
  el=document.getElementById('doc-name-input'); if(el) el.addEventListener('input',function(){ state.docName=this.value; });
  el=document.getElementById('btn-translate'); if(el) el.addEventListener('click',startTranslation);
  el=document.getElementById('btn-another'); if(el) el.addEventListener('click',function(){ resetWorkspace(); render(); });
  el=document.getElementById('btn-to-home'); if(el) el.addEventListener('click',goHome);
  document.querySelectorAll('[data-fmt]').forEach(function(b){
    b.addEventListener('click',function(){ var k=this.getAttribute('data-fmt'); state.formats[k]=!state.formats[k]; this.classList.toggle('checked',state.formats[k]); });
  });
  document.querySelectorAll('[data-dlid]').forEach(function(b){
    b.addEventListener('click',function(){ triggerDownload(this.getAttribute('data-dlid')); });
  });

  var dz=document.getElementById('dropzone');
  var fi=document.getElementById('file-input');
  if(dz&&fi){
    dz.addEventListener('dragover',function(e){ e.preventDefault(); dz.classList.add('drag-active'); });
    dz.addEventListener('dragenter',function(e){ e.preventDefault(); });
    dz.addEventListener('dragleave',function(){ dz.classList.remove('drag-active'); });
    dz.addEventListener('drop',function(e){ e.preventDefault(); dz.classList.remove('drag-active'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
    fi.addEventListener('change',function(e){ if(e.target.files[0]) handleFile(e.target.files[0]); });
  }
}

function handleFile(file){
  if(!file.type.startsWith('image/')&&file.type!=='application/pdf'){ alert('PDF 또는 이미지 파일만 가능합니다.'); return; }
  state.file=file; render();
}

// ── TRANSLATION FLOW ──────────────────────────────────────────
function setProgress(status,msg,pct){ state.status=status; state.statusMsg=msg; state.progress=pct; render(); }

async function startTranslation(){
  if(!state.file){ alert('파일을 먼저 업로드해주세요.'); return; }
  if(!state.docName.trim()){ alert('서류명을 입력해주세요.'); return; }
  if(!state.formats.word&&!state.formats.excel&&!state.formats.summary){ alert('출력 형식을 하나 이상 선택해주세요.'); return; }

  try {
    setProgress('extracting','파일에서 이미지를 추출하는 중...',10);
    var ex = await extractImages(state.file);
    state.fileImages = ex.images;
    state.fileMimes = ex.mimes;

    setProgress('translating','Gemini AI가 언어를 감지하고 번역 중...',35);
    var result = await callGeminiAPI(state.fileImages, state.fileMimes);
    state.translationData = result;

    setProgress('generating','보고서 파일 생성 중...',75);
    state.downloads=[]; dlBlobStore={};

    var p=state.currentProject; var dn=state.docName.trim();
    var base=makeFileName(p.name,dn);

    if(state.formats.word){ var b1=await makeWordDoc(result,p.name,dn,'full'); addDl('word',b1,base+'_번역본.docx','MS Word 번역본','&#128221;'); }
    if(state.formats.excel){ var b2=makeExcelDoc(result,p.name,dn); addDl('excel',b2,base+'_대조표.xlsx','Excel 대조표','&#128202;'); }
    if(state.formats.summary){ var b3=await makeWordDoc(result,p.name,dn,'summary'); addDl('summary',b3,base+'_요약본.docx','요약본 (Word)','&#128203;'); }

    state.status='done'; state.progress=100; render();
  } catch(err){
    console.error(err);
    state.status='error';
    state.errorMsg=(err&&err.message)?err.message:'번역 중 오류가 발생했습니다.';
    render();
  }
}

function addDl(id,blob,filename,label,icon){ dlBlobStore[id]=blob; state.downloads.push({id,blob,filename,label,icon}); }

function triggerDownload(id){
  var blob=dlBlobStore[id]; var dl=null;
  for(var i=0;i<state.downloads.length;i++){ if(state.downloads[i].id===id){ dl=state.downloads[i]; break; } }
  if(!blob||!dl) return;
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download=dl.filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); },3000);
}

// ── IMAGE EXTRACTION ──────────────────────────────────────────
async function extractImages(file){
  if(file.type==='application/pdf') return extractPdf(file);
  var b64=await toBase64(file);
  return { images:[b64], mimes:[file.type||'image/jpeg'] };
}

async function extractPdf(file){
  var ab=await file.arrayBuffer();
  var pdf=await pdfjsLib.getDocument({data:ab}).promise;
  var total=Math.min(pdf.numPages,12);
  var images=[],mimes=[];
  for(var i=1;i<=total;i++){
    setProgress('extracting','PDF '+i+'/'+total+' 페이지 처리 중...',Math.round(10+(i/total)*20));
    var page=await pdf.getPage(i);
    var vp=page.getViewport({scale:2.0});
    var canvas=document.createElement('canvas');
    canvas.width=vp.width; canvas.height=vp.height;
    await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
    images.push(canvas.toDataURL('image/jpeg',0.82).split(',')[1]);
    mimes.push('image/jpeg');
  }
  return {images,mimes};
}

function toBase64(file){
  return new Promise(function(res,rej){
    var fr=new FileReader();
    fr.onload=function(e){ res(e.target.result.split(',')[1]); };
    fr.onerror=rej;
    fr.readAsDataURL(file);
  });
}

// ── GEMINI API 호출 ───────────────────────────────────────────
async function callGeminiAPI(images, mimes){
  // Gemini 형식으로 parts 구성 (이미지 + 텍스트 프롬프트)
  var parts = [];

  for(var i=0;i<images.length;i++){
    parts.push({
      inlineData: {
        mimeType: mimes[i]||'image/jpeg',
        data: images[i]
      }
    });
  }

  parts.push({
    text:
      '위 이미지는 계약서 문서입니다 (총 '+images.length+'페이지).\n\n'+
      '다음 작업을 수행한 후 순수 JSON만 반환하세요 (마크다운 코드블록 없이):\n\n'+
      '1. 원본 언어 감지\n'+
      '2. 전체 텍스트 추출\n'+
      '3. 한국어 전문 번역\n\n'+
      '응답 형식 (이 JSON 구조만 반환):\n'+
      '{"detected_language":"언어명(예:영어,일본어,중국어,베트남어,태국어)","title_original":"원문제목","title_ko":"한국어번역제목",'+
      '"sections":[{"type":"heading|subheading|article|clause|paragraph|table|signature","original":"원문","translation":"번역"}],'+
      '"summary_ko":"핵심요약(500자이내)"}'
  });

  var resp = await fetch(API_ENDPOINT, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ parts: parts })
  });

  var data = await resp.json();
  if(!resp.ok) throw new Error(data.error||'API 오류: '+resp.status);
  if(data.error) throw new Error(data.error);
  return data;
}

// ── WORD 문서 생성 ────────────────────────────────────────────
function escX(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;'); }
function wRun(text,bold,italic,size,color){
  var rpr='<w:rFonts w:ascii="&#47561;&#51008; &#44256;&#46357;" w:hAnsi="&#47561;&#51008; &#44256;&#46357;" w:cs="&#47561;&#51008; &#44256;&#46357;"/>';
  if(bold) rpr+='<w:b/><w:bCs/>';
  if(italic) rpr+='<w:i/><w:iCs/>';
  rpr+='<w:sz w:val="'+(size||22)+'"/><w:szCs w:val="'+(size||22)+'"/>';
  if(color) rpr+='<w:color w:val="'+color+'"/>';
  return '<w:r><w:rPr>'+rpr+'</w:rPr><w:t xml:space="preserve">'+escX(text)+'</w:t></w:r>';
}
function wPar(run,sp){
  var s=sp||200;
  return '<w:p><w:pPr><w:spacing w:before="'+s+'" w:after="'+s+'" w:line="360" w:lineRule="auto"/><w:jc w:val="both"/></w:pPr>'+run+'</w:p>';
}
function wTable(rows){
  var trs='';
  for(var ri=0;ri<rows.length;ri++){
    var isH=ri===0; var bc=isH?'1A2D42':'DDDDDD'; var tds='';
    for(var ci=0;ci<rows[ri].length;ci++){
      var rpr='<w:rFonts w:ascii="&#47561;&#51008; &#44256;&#46357;" w:hAnsi="&#47561;&#51008; &#44256;&#46357;" w:cs="&#47561;&#51008; &#44256;&#46357;"/>';
      if(isH) rpr+='<w:b/><w:bCs/><w:color w:val="FFFFFF"/>'; rpr+='<w:sz w:val="20"/><w:szCs w:val="20"/>';
      var fill=isH?'<w:shd w:val="clear" w:color="auto" w:fill="1A2D42"/>':'';
      tds+='<w:tc><w:tcPr><w:tcBorders>'+
        '<w:top w:val="single" w:sz="4" w:color="'+bc+'"/><w:bottom w:val="single" w:sz="4" w:color="'+bc+'"/>'+
        '<w:left w:val="single" w:sz="4" w:color="'+bc+'"/><w:right w:val="single" w:sz="4" w:color="'+bc+'"/>'+
        '</w:tcBorders>'+fill+
        '<w:tcMar><w:top w:w="80" w:type="dxa"/><w:left w:w="120" w:type="dxa"/><w:bottom w:w="80" w:type="dxa"/><w:right w:w="120" w:type="dxa"/></w:tcMar>'+
        '</w:tcPr><w:p><w:r><w:rPr>'+rpr+'</w:rPr><w:t xml:space="preserve">'+escX(String(rows[ri][ci]||''))+'</w:t></w:r></w:p></w:tc>';
    }
    trs+='<w:tr>'+tds+'</w:tr>';
  }
  return '<w:tbl><w:tblPr><w:tblW w:w="7200" w:type="dxa"/><w:tblLayout w:type="fixed"/></w:tblPr>'+
    '<w:tblGrid><w:gridCol w:w="1800"/><w:gridCol w:w="5400"/></w:tblGrid>'+trs+'</w:tbl><w:p/>';
}

async function makeWordDoc(data,projName,docName,type){
  var zip=new JSZip();
  var now=new Date().toLocaleDateString('ko-KR');
  var label=type==='summary'?'계약서 번역 요약본':'계약서 번역본';
  var titleKo=data.title_ko||data.title_original||'제목 미상';
  var titleOrig=data.title_original||'';

  var meta=wPar(wRun(label,true,false,36,'1A2D42'))+
    wPar(wRun('',false,false,12))+
    wPar(wRun('['+titleKo+']',true,false,28,'1A2D42'))+
    wPar(wRun('('+titleOrig+')',false,true,22,'888888'))+
    wPar(wRun('',false,false,12))+
    wTable([['항목','내용'],['프로젝트',projName],['서류명',docName],['원본 언어',data.detected_language||'자동감지'],['번역 일시',now],['번역 엔진','Google Gemini 2.5 Flash (ContractLens)']])+
    wPar(wRun('',false,false,12))+
    wPar(wRun('- - - - - - - - - - - - - - - - - - - - - - - - - -',false,false,16,'CCCCCC'))+
    wPar(wRun('',false,false,12));

  var body=meta;
  var tmap={heading:'[제목]',subheading:'[소제목]',article:'[조항]',clause:'[세부항목]',paragraph:'[문단]',table:'[표]',signature:'[서명란]'};

  if(type==='summary'){
    body+=wPar(wRun('[핵심 내용 요약]',true,false,28,'1A2D42'));
    body+=wPar(wRun('',false,false,12));
    var lines=(data.summary_ko||'요약 없음').split(/\n/);
    for(var li=0;li<lines.length;li++){ if(lines[li].trim()) body+=wPar(wRun(lines[li].trim(),false,false,22)); }
  } else {
    var secs=data.sections||[];
    for(var i=0;i<secs.length;i++){
      var sec=secs[i]; var st=sec.type||'paragraph';
      var tl=tmap[st]||'[항목]';
      var isH=(st==='heading'||st==='subheading'||st==='article');
      var fs=st==='heading'?26:isH?23:22;
      body+=wPar(wRun(tl+' '+(sec.translation||''),isH,false,fs,isH?'1A2D42':null));
      body+=wPar(wRun('[원문] '+(sec.original||''),false,true,19,'888888'));
      body+=wPar(wRun('',false,false,8));
    }
  }

  var docXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>'+body+
    '<w:sectPr><w:pgSz w:w="12240" w:h="15840"/><w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1800"/></w:sectPr>'+
    '</w:body></w:document>';
  var stylesXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">'+
    '<w:docDefaults><w:rPrDefault><w:rPr>'+
    '<w:rFonts w:ascii="&#47561;&#51008; &#44256;&#46357;" w:hAnsi="&#47561;&#51008; &#44256;&#46357;" w:cs="&#47561;&#51008; &#44256;&#46357;"/>'+
    '<w:sz w:val="22"/></w:rPr></w:rPrDefault>'+
    '<w:pPrDefault><w:pPr><w:spacing w:line="360" w:lineRule="auto"/></w:pPr></w:pPrDefault>'+
    '</w:docDefaults></w:styles>';
  var ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">'+
    '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>'+
    '<Default Extension="xml" ContentType="application/xml"/>'+
    '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>'+
    '<Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>'+
    '</Types>';
  var rels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+
    '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>'+
    '</Relationships>';
  var wRels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+
    '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>'+
    '</Relationships>';

  zip.file('[Content_Types].xml',ct);
  zip.file('_rels/.rels',rels);
  zip.file('word/document.xml',docXml);
  zip.file('word/styles.xml',stylesXml);
  zip.file('word/_rels/document.xml.rels',wRels);
  return await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
}

// ── EXCEL 생성 ────────────────────────────────────────────────
function makeExcelDoc(data,projName,docName){
  var wb=XLSX.utils.book_new();
  var now=new Date().toLocaleDateString('ko-KR');
  var secs=data.sections||[];
  var tmap2={heading:'제목',subheading:'소제목',article:'조항',clause:'세부항목',paragraph:'문단',table:'표',signature:'서명란'};
  var rows=[
    ['계약서 번역 대조표','','',''],
    ['프로젝트: '+projName,'','서류명: '+docName,''],
    ['원본 언어: '+(data.detected_language||''),'','번역 일시: '+now,''],
    ['원문 제목: '+(data.title_original||''),'','번역 제목: '+(data.title_ko||''),''],
    [],
    ['번호','구분','원문','한국어 번역']
  ];
  for(var i=0;i<secs.length;i++){
    rows.push([i+1,tmap2[secs[i].type]||'기타',secs[i].original||'',secs[i].translation||'']);
  }
  var ws1=XLSX.utils.aoa_to_sheet(rows);
  ws1['!cols']=[{wch:5},{wch:12},{wch:50},{wch:55}];
  ws1['!merges']=[
    {s:{r:0,c:0},e:{r:0,c:3}},
    {s:{r:1,c:0},e:{r:1,c:1}},{s:{r:1,c:2},e:{r:1,c:3}},
    {s:{r:2,c:0},e:{r:2,c:1}},{s:{r:2,c:2},e:{r:2,c:3}},
    {s:{r:3,c:0},e:{r:3,c:1}},{s:{r:3,c:2},e:{r:3,c:3}}
  ];
  XLSX.utils.book_append_sheet(wb,ws1,'번역 대조표');
  var ws2=XLSX.utils.aoa_to_sheet([
    ['계약서 핵심 요약'],
    ['프로젝트: '+projName+' | 서류명: '+docName+' | 번역일: '+now],
    [],['핵심 내용 요약 (한국어)'],[data.summary_ko||'']
  ]);
  ws2['!cols']=[{wch:90}];
  XLSX.utils.book_append_sheet(wb,ws2,'핵심 요약');
  var arr=XLSX.write(wb,{bookType:'xlsx',type:'array'});
  return new Blob([arr],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
}

// ── UTILS ─────────────────────────────────────────────────────
function makeFileName(p,d){
  function cl(s){ return String(s).replace(/\s+/g,'').replace(/[\\/:*?"<>|]/g,'_'); }
  return 'P-'+cl(p)+'_'+cl(d);
}
